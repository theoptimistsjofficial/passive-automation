name: Daily video generation

on:
  schedule:
    # Mon/Wed/Fri at 3:00 UTC = 8:30 IST — positive_thinking
    - cron: "0 3 * * 1,3,5"
    # Tue/Thu/Sat at 3:00 UTC = 8:30 IST — devotional
    - cron: "0 3 * * 2,4,6"
  workflow_dispatch:
    inputs:
      niche:
        description: "Niche to generate"
        required: false
        default: "positive_thinking"
        type: choice
        options:
          - positive_thinking
          - devotional
      upload:
        description: "Upload to YouTube"
        required: false
        default: true
        type: boolean
      privacy:
        description: "YouTube privacy"
        required: false
        default: "public"
        type: choice
        options:
          - public
          - unlisted
          - private

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system deps
        run: sudo apt-get install -y ffmpeg fonts-dejavu-core

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Pick niche by day
        id: pick
        run: |
          if [ -n "${{ github.event.inputs.niche }}" ]; then
            echo "niche=${{ github.event.inputs.niche }}" >> $GITHUB_OUTPUT
          else
            DOW=$(date -u +%u)
            if [ "$DOW" = "2" ] || [ "$DOW" = "4" ] || [ "$DOW" = "6" ]; then
              echo "niche=devotional" >> $GITHUB_OUTPUT
            else
              echo "niche=positive_thinking" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Write .env and YouTube credentials
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          ELEVENLABS_VOICE_ID: ${{ secrets.ELEVENLABS_VOICE_ID }}
          FAL_API_KEY: ${{ secrets.FAL_API_KEY }}
          FAL_MODEL: ${{ secrets.FAL_MODEL }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_TOKEN: ${{ secrets.YOUTUBE_TOKEN }}
          CHANNEL_NAME: ${{ secrets.CHANNEL_NAME }}
        run: |
          cat > .env <<EOF
          GEMINI_API_KEY=$GEMINI_API_KEY
          PEXELS_API_KEY=$PEXELS_API_KEY
          ELEVENLABS_API_KEY=$ELEVENLABS_API_KEY
          ELEVENLABS_VOICE_ID=$ELEVENLABS_VOICE_ID
          FAL_API_KEY=$FAL_API_KEY
          FAL_MODEL=${FAL_MODEL:-fal-ai/kling-video/v2/master/text-to-video}
          PIXABAY_API_KEY=$PIXABAY_API_KEY
          CHANNEL_NAME=${CHANNEL_NAME:-OptimistMantra}
          EOF
          mkdir -p config
          echo "$YOUTUBE_CLIENT_SECRET" > config/youtube_client_secret.json
          echo "$YOUTUBE_TOKEN" > config/youtube_token.json

      - name: Generate + upload
        env:
          PRIVACY: ${{ github.event.inputs.privacy || 'public' }}
          UPLOAD_FLAG: ${{ github.event.inputs.upload == 'false' && '' || '--upload' }}
        run: |
          python run.py ${{ steps.pick.outputs.niche }} --mark-done $UPLOAD_FLAG --$PRIVACY

      - name: Upload artifact (final MP4)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: video-${{ steps.pick.outputs.niche }}-${{ github.run_id }}
          path: io_data/output/*.mp4
          retention-days: 14
